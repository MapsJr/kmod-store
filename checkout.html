<section class="checkout-page">

<div class="checkout-form">

<h1>CHECKOUT</h1>

<form id="checkoutForm">

<input
type="text"
id="fullName"
placeholder="Full Name"
required>

<input
type="email"
id="email"
placeholder="Email Address"
required>

<input
type="tel"
id="phone"
placeholder="Phone Number"
required>

<input
type="text"
id="address"
placeholder="Street Address"
required>

<input
type="text"
id="city"
placeholder="City"
required>

<input
type="text"
id="country"
placeholder="Country"
required>

<input
type="text"
id="zip"
placeholder="ZIP Code"
required>

<h3>PAYMENT METHOD</h3>

<div class="payment-options">

<label>
<input type="radio"
name="payment"
value="Card"
checked>

Credit Card
</label>

<label>
<input type="radio"
name="payment"
value="PayPal">

PayPal
</label>

<label>
<input type="radio"
name="payment"
value="ApplePay">

Apple Pay
</label>

</div>

<button type="submit">

PLACE ORDER

</button>

</form>

</div>

<div class="order-summary">

<h2>ORDER SUMMARY</h2>

<div id="summaryItems"></div>

<div class="summary-total">

<h3>Total:</h3>

<span id="orderTotal">$0</span>

</div>

</div>

</section>
