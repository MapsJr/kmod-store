<head>

<link rel="apple-touch-icon" href="favicon.png">

<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/product.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">

</head>

<body>

<nav>

    <div class="logo">
        KMØD
    </div>

    <div class="menu-toggle" id="menuToggle">

        <span></span>
        <span></span>
        <span></span>

    </div>

    <ul id="navMenu">

        <li><a href="index.html">HOME</a></li>
        <li><a href="shop.html">SHOP</a></li>
        <li><a href="journal.html">JOURNAL</a></li>
        <li><a href="about.html">ABOUT</a></li>
        <li><a href="contact.html">CONTACT</a></li>

    </ul>

    <div class="nav-actions" id="authContainer">

        <a href="login.html">SIGN IN</a>

        <a href="register.html">SIGN UP</a>

        <a href="cart.html">
            🛒 (<span id="cartCount">0</span>)
        </a>

    </div>

</nav>

<section class="product-page">

<div class="gallery">

<div class="main-image">

<img
id="mainImage"
src="assets/Images/Black.png"
alt="Product">

</div>

<div class="thumbnails">

<img
class="thumbnail active"
src="assets/Images/Black-Purple.png"
alt="Black Future T-Shirt front view"
title="Black Future T-Shirt front view">

<img
class="thumbnail"
src="assets/Images/Dark-Brown.png"
alt="Deep Future T-Shirt front view"
title="Deep Future T-Shirt front view">

<img
class="thumbnail"
src="assets/Images/Black.png"
alt="Lighter Future T-Shirt detail"
title="Lighter Future T-Shirt detail">

</div>

</div>

<div class="product-details">

<span class="product-category">
HOODIE
</span>

<h1>
NORTHSTAR HOODIE
</h1>

<p class="price">
$129
</p>

<p class="description">

Dark and Purple designed
for movement, identity and comfort.

Premium cotton blend with oversized fit.

</p>

<div class="colors">

    <h3>COLOR</h3>

    <div class="color-buttons">

        <button
        type="button"
        class="color-btn active"
        data-color="black"
        data-image="assets/Images/Black.png"
        aria-label="Black">
        </button>

        <button
        type="button"
        class="color-btn purple"
        data-color="purple"
        data-image="assets/Images/Black-Purple.png"
        aria-label="Purple">
        </button>

        <button
        type="button"
        class="color-btn brown"
        data-color="brown"
        data-image="assets/Images/Dark-Brown.png"
        aria-label="Brown">
        </button>

        <button
        type="button"
        class="color-btn blue"
        data-color="blue"
        data-image="assets/Images/Blue.png"
        aria-label="Blue">
        </button>

    </div>

</div>

<div class="sizes">

<h3>
SIZE
</h3>

<div class="size-buttons">

<button type="button" class="size-btn">
S
</button>

<button type="button" class="size-btn">
M
</button>

<button type="button" class="size-btn">
L
</button>

<button type="button" class="size-btn">
XL
</button>

</div>

</div>

<div class="quantity">

<h3>
QUANTITY
</h3>

<div class="quantity-controls">

<button type="button" id="minus">
-
</button>

<span id="quantity">
1
</span>

<button type="button" id="plus">
+
</button>

</div>

</div>

<button
type="button"
id="addToCart"
class="add-cart">

ADD TO CART

</button>

</div>

</section>

<script type="module" src="js/auth-ui.js"></script>
<script type="module" src="js/product.js"></script>
<script type="module" src="js/cart-counter.js"></script>
<script type="module" src="js/menu.js"></script>

</body>
</html>
